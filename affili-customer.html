<style>
:root {
  --bg: #080808;
  --bg2: #0f0f0f;
  --bg3: #161616;
  --bg4: #1e1e1e;
  --border: #222;
  --border2: #2e2e2e;
  --text: #f0f0f0;
  --text2: #888;
  --text3: #444;
  --accent: #ffffff;
  --accent2: #e5e5e5;
  --green: #4ade80;
  --red: #f87171;
  --amber: #fbbf24;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── LAYOUT ── */
#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
}

@media (min-width: 768px) {
  #app { max-width: 420px; }
}

/* ── NAVBAR ── */
#navbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  flex-shrink: 0;
}

.nav-logo {
  font-family: 'Space Mono', monospace;
  font-size: 15px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: .08em;
  text-transform: uppercase;
}

.nav-logo span {
  color: var(--text3);
}

.nav-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text2);
  font-family: 'Space Mono', monospace;
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: .4; }
}

/* ── BRAND BAR ── */
#brand-bar {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  scrollbar-width: none;
  flex-shrink: 0;
}
#brand-bar::-webkit-scrollbar { display: none; }

.brand-tab {
  padding: 8px 14px;
  font-size: 11px;
  font-weight: 500;
  color: var(--text3);
  cursor: pointer;
  border-right: 1px solid var(--border);
  white-space: nowrap;
  transition: all .15s;
  font-family: 'Space Mono', monospace;
  letter-spacing: .04em;
  text-transform: uppercase;
  flex-shrink: 0;
  background: var(--bg);
  border-bottom: 2px solid transparent;
}

.brand-tab:hover { color: var(--text2); background: var(--bg2); }
.brand-tab.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--bg2); }

.brand-tab-add {
  padding: 8px 14px;
  font-size: 11px;
  color: var(--text3);
  cursor: pointer;
  font-family: 'Space Mono', monospace;
  white-space: nowrap;
  flex-shrink: 0;
  transition: color .15s;
  margin-left: auto;
}
.brand-tab-add:hover { color: var(--text2); }

/* ── MESSAGES ── */
#msgs {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.msg {
  max-width: 82%;
  font-size: 14px;
  line-height: 1.6;
  word-break: break-word;
  animation: fadeUp .2s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg.bot {
  align-self: flex-start;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 2px 12px 12px 12px;
  padding: 10px 14px;
  color: var(--text);
}

.msg.user {
  align-self: flex-end;
  background: var(--accent);
  border-radius: 12px 2px 12px 12px;
  padding: 10px 14px;
  color: #000;
  font-weight: 500;
}

.msg.typing {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 2px 12px 12px 12px;
  padding: 12px 16px;
  align-self: flex-start;
}

.typing-dots {
  display: flex;
  gap: 4px;
  align-items: center;
}

.typing-dots span {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--text3);
  animation: blink 1.2s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: .2s; }
.typing-dots span:nth-child(3) { animation-delay: .4s; }

@keyframes blink {
  0%, 80%, 100% { opacity: .2; }
  40% { opacity: 1; }
}

/* ── PRODUCT CARD ── */
.pkg {
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 10px 12px;
  margin-top: 6px;
  background: var(--bg2);
}
.pkg-name { font-weight: 600; font-size: 13px; color: var(--text); }
.pkg-price { font-size: 12px; color: var(--accent2); margin: 3px 0; font-family: 'Space Mono', monospace; }
.pkg-bonus { font-size: 11px; color: var(--text2); }

.ctas { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
.cta {
  display: block;
  text-align: center;
  padding: 10px 16px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  text-decoration: none;
  cursor: pointer;
  font-family: 'Space Grotesk', sans-serif;
  letter-spacing: .02em;
  transition: opacity .15s;
}
.cta:hover { opacity: .85; }
.cta-white { background: #fff; color: #000; }
.cta-wa { background: #25d366; color: #fff; }

/* ── QUICK BUTTONS ── */
#qbtns {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 8px 16px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;

.qb {
  font-size: 12px;
  padding: 5px 12px;
  border: 1px solid var(--border2);
  border-radius: 999px;
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  font-family: 'Space Grotesk', sans-serif;
  transition: all .12s;
  white-space: nowrap;
}
.qb:hover { border-color: var(--text2); color: var(--text); }

/* ── INPUT ROW ── */
#input-row {
  display: flex;
  gap: 0;
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  background: var(--bg);
  flex-shrink: 0;

#uinp {
  flex: 1;
  background: var(--bg3);

  border-right: none;
  border-radius: 6px 0 0 6px;
  padding: 10px 14px;
  font-size: 14px;
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  outline: none;
  transition: border-color .15s;

#uinp:focus { border-color: var(--text3); }
#uinp::placeholder { color: var(--text3); }

#sbtn {
  background: var(--accent);

  border-radius: 0 6px 6px 0;
  padding: 10px 18px;

  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Space Mono', monospace;
  letter-spacing: .04em;

#sbtn:hover { opacity: .85; }

/* ── FOOTER ── */
#footer {

  background: none;
  border: none;

.reset-btn:hover { color: var(--text2); }

/* ── GEO DB: kecamatan/area Indonesia ── */

function geocodeLocal(text) {
  const t = text.toLowerCase().replace(/[^\w\s]/g,' ').replace(/\s+/g,' ').trim();
  const words = t.split(' ');
  for(let len = 4; len >= 1; len--) {
    for(let i = 0; i <= words.length - len; i++) {
      const phrase = words.slice(i, i+len).join(' ');
      for(const g of GEO) {
        if(g.k.some(k => k === phrase || phrase.includes(k) || k.includes(phrase))) {
          return { lat: g.lat, lng: g.lng };
        }
      }
    }
  }
  return null;
}

function haversine(lat1,lng1,lat2,lng2) {
  const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return +(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))).toFixed(1);
}

function getNearest(lat, lng, branches, n) {
  return branches.map(b=>({...b, dist: haversine(lat,lng,b.lat,b.lng)})).sort((a,b)=>a.dist-b.dist).slice(0,n||2);
}

let cfg = CONFIGS.ftl;
let prof = {};
let step = 0;
let qIdx = 0;
let waitingForAddress = false;

const msgsEl = document.getElementById('msgs');
const qEl = document.getElementById('qbtns');
const inp = document.getElementById('uinp');

function scroll() { msgsEl.scrollTop = msgsEl.scrollHeight; }

function addMsg(txt, role, html) {
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  if(html) d.innerHTML = txt; else d.textContent = txt;
  msgsEl.appendChild(d); scroll(); return d;
}

function showTyping() {
  const d = document.createElement('div');
  d.className = 'msg typing'; d.id = 'tdot';
  d.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  msgsEl.appendChild(d); scroll();
}
function removeTyping() { const e = document.getElementById('tdot'); if(e) e.remove(); }

function bot(txt, html, delay) {
  showTyping();
  setTimeout(() => { removeTyping(); addMsg(txt, 'bot', html); }, delay || 500);
}

function setQ(opts) {
  qEl.innerHTML = '';
  (opts||[]).forEach(o => {
    const b = document.createElement('button');
    b.className = 'qb'; b.textContent = o;
    b.onclick = () => handle(o);
    qEl.appendChild(b);
  });
}

function detectTone(msg) {
  return /\b(saya|mohon|apakah|hendak|ingin|terima kasih)\b/.test(msg.toLowerCase()) ? 'formal' : 'casual';
}

function pickProducts() {
  const budget = (prof.budget||'').toLowerCase();
  const type = (prof.type||'').toLowerCase();
  const isLow = budget.includes('bawah') || budget.includes('200') || budget.includes('400');
  const isHigh = budget.includes('atas') || budget.includes('bebas') || budget.includes('600') || budget.includes('2 m');
  const isPilates = type.includes('pilates');

  let pool = cfg.products;
  if(isPilates) pool = pool.filter(p => p.tags.includes('pilates'));
  else if(isHigh) pool = pool.filter(p => p.tags.includes('premium') || p.tags.includes('large'));
  else if(isLow) pool = pool.filter(p => p.tags.includes('budget') || p.tags.includes('small'));
  if(!pool.length) pool = cfg.products;
  return pool.slice(0, 2);
}

function pkgCard(pk) {
  return `<div class="pkg">
    <div class="pkg-name">${pk.name}</div>
    <div class="pkg-price">${pk.price}${pk.total !== pk.price ? ' · Total ' + pk.total : ''}</div>
    <div class="pkg-bonus">${pk.bonus}</div>
  </div>`;
}

function branchCard(b) {
  const stars = '★'.repeat(Math.round(b.rating)) + '☆'.repeat(5-Math.round(b.rating));
  const ultra = b.ultra ? ' <span style="font-size:10px;background:#7c3aed;color:#fff;padding:1px 5px;border-radius:3px">ULTRA</span>' : '';
  const mapsUrl = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent((prof.rawAddress||'') + ', Indonesia')}&destination=${encodeURIComponent(b.name + ', ' + b.addr + ', Indonesia')}&travelmode=driving`;
  return `<div class="pkg">
    <div class="pkg-name">${b.name}${ultra}</div>
    <div class="pkg-bonus" style="margin:2px 0">${b.addr}</div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px">
      <span style="font-size:11px;color:#888">${stars} ${b.rating} · 24 jam</span>
      ${b.dist != null ? `<span style="font-size:12px;color:#fff;font-family:'Space Mono',monospace">${b.dist} km</span>` : ''}
    </div>
    <a href="${mapsUrl}" target="_blank" style="display:inline-block;margin-top:7px;background:#1a73e8;color:#fff;font-size:11px;padding:4px 10px;border-radius:4px;text-decoration:none;font-family:'Space Mono',monospace">MAPS →</a>
  </div>`;
}

function ctaBlock() {
  const waMsg = encodeURIComponent(`Halo! Aku ${prof.name||''} mau tanya soal ${cfg.brandName}`);
  return `<div class="ctas">
    <a class="cta cta-white" href="${cfg.affiliateLink}" target="_blank">${cfg.ctaText}</a>
    <a class="cta cta-wa" href="https://wa.me/${cfg.whatsapp}?text=${waMsg}" target="_blank">${cfg.waText}</a>
  </div>`;
}

function buildRecoMsg() {
  const picks = pickProducts();
  const name = prof.name || 'kamu';
  const T = prof.tone === 'formal';
  const nearInfo = prof.nearestBranch ? `<div style="font-size:11px;color:#888;margin:4px 0 2px;font-family:'Space Mono',monospace">CABANG TERDEKAT: ${prof.nearestBranch}</div>` : '';
  const intro = T
    ? `Berdasarkan informasi Anda, ini rekomendasi terbaik dari ${cfg.brandName}, ${name}:`
    : `Oke ${name}! Ini rekomendasi paling pas dari ${cfg.brandName} buat kamu:`;
  return intro + nearInfo + picks.map(pkgCard).join('') + '<br>' + ctaBlock();
}

function handleRejection(msg) {
  const m = msg.toLowerCase();
  const name = prof.name || 'kamu';
  const picks = pickProducts();
  const cheapest = [...picks].sort((a,b) => a.pn - b.pn)[0] || cfg.products[0];

  if(m.includes('mahal') || m.includes('kemahalan') || m.includes('berat di budget') || m.includes('mahal banget')) {
    const obj = cfg.objections.price;
    bot(obj.fn(name, cheapest), false, 500);
    setTimeout(() => setQ(obj.opts), 1000);
    return true;
  }
  if(m.includes('lama') || m.includes('kelamaan') || (m.includes('panjang') && m.includes('durasi'))) {
    const obj = cfg.objections.duration;
    bot(obj.fn(name, cheapest), false, 500);
    setTimeout(() => setQ(obj.opts), 1000);
    return true;
  }
  if(m.includes('ragu') || m.includes('pikir-pikir') || m.includes('pikir dulu') || (m.includes('belum') && m.includes('yakin')) || m.includes('pertimbang')) {
    const obj = cfg.objections.doubt;
    bot(obj.fn(name), false, 500);
    setTimeout(() => setQ(obj.opts), 1000);
    return true;
  }
  if((m.includes('jauh') || m.includes('lokasi') || m.includes('cabang')) && !m.includes('ada')) {
    if(prof.userLat && prof.userLng && cfg.branches.length) {
      const nearest = getNearest(prof.userLat, prof.userLng, cfg.branches, 2);
      const cards = nearest.map(b => branchCard(b)).join('');
      bot('Ini 2 cabang terdekat dari kamu:', false, 400);
      setTimeout(() => { removeTyping(); addMsg(cards, 'bot', true); }, 500);
    } else {
      const obj = cfg.objections.location;
      bot(obj.fn(name), false, 500);
      setTimeout(() => setQ(obj.opts), 1000);
    }
    return true;
  }
  return false;
}

function processLocation(address) {
  prof.rawAddress = address;
  const geo = geocodeLocal(address);

  if(!geo) {
    bot(`Hmm, aku belum punya data koordinat untuk area "<b>${address}</b>" nih.\n\nCoba sebutkan nama kecamatan atau kelurahan kamu — contoh: "Kramat Jati", "Tebet", "Depok Lama", atau pilih di bawah:`, true, 400);
    setQ(['Jakarta Selatan','Jakarta Timur','Jakarta Barat','Jakarta Pusat','Bekasi','Bogor','Depok','Tangerang','Bandung']);
    waitingForAddress = true;
    return false;
  }

  prof.userLat = geo.lat;
  prof.userLng = geo.lng;
  waitingForAddress = false;

  if(cfg.branches.length) {
    const nearest = getNearest(geo.lat, geo.lng, cfg.branches, 2);
    prof.nearestBranch = nearest[0] ? nearest[0].name : '';
    const T = prof.tone === 'formal';
    const intro = T
      ? `Berdasarkan area <b>${address}</b>, ini 2 cabang ${cfg.brandName} terdekat:`
      : `Ketemu! Berdasarkan area <b>${address}</b>, ini 2 cabang paling deket dari kamu:`;
    showTyping();
    setTimeout(() => {
      removeTyping();
      addMsg(intro + nearest.map(b => branchCard(b)).join(''), 'bot', true);
    }, 500);
    return true;
  }
  return true;
}

function handle(raw) {
  const msg = raw.trim();
  if(!msg) return;
  addMsg(msg, 'user');
  inp.value = ''; qEl.innerHTML = '';
  if(!prof.tone) prof.tone = detectTone(msg);
  const m = msg.toLowerCase();
  const T = prof.tone === 'formal';
  const name = prof.name || 'kamu';

  if(step === 0) {
    prof.name = msg.trim().split(' ').pop();
    step = 1; qIdx = 0;
    const q = cfg.questions[qIdx];
    bot(`Hai ${prof.name}! Seneng kenalan 😊\n\n${q.text}`, false, 400);
    setTimeout(() => setQ(q.opts), 900);
    return;
  }

  if(step === 1) {
    if(waitingForAddress) {
      const ok = processLocation(msg);
      if(ok) {
        waitingForAddress = false;
        const nextQ = cfg.questions[qIdx];
        if(nextQ) {
          setTimeout(() => { bot(nextQ.text, false, 300); setTimeout(() => setQ(nextQ.opts), 800); }, 900);
        } else {
          step = 2;
          setTimeout(() => { bot(buildRecoMsg(), true, 400); setTimeout(() => setQ(['Oke, mau lanjut!','Kemahalan nih','Masih mau pikir dulu','Lihat semua pilihan']), 900); }, 900);
        }
      }
      return;
    }

    const q = cfg.questions[qIdx];
    prof[q.key] = msg;

    if(q.key === 'location' && cfg.branches.length) {
      const ok = processLocation(msg);
      qIdx++;
      if(qIdx < cfg.questions.length) {
        const nextQ = cfg.questions[qIdx];
        const delay = ok ? 1200 : 600;
        setTimeout(() => { bot(nextQ.text, false, 300); setTimeout(() => setQ(nextQ.opts), 800); }, delay);
      } else {
        step = 2;
        const delay = ok ? 1200 : 600;
        setTimeout(() => { bot(buildRecoMsg(), true, 400); setTimeout(() => setQ(['Oke, mau lanjut!','Kemahalan nih','Masih mau pikir dulu','Lihat semua pilihan']), 900); }, delay);
      }
      return;
    }

    qIdx++;
    if(qIdx < cfg.questions.length) {
      const nextQ = cfg.questions[qIdx];
      bot(nextQ.text, false, 400);
      setTimeout(() => setQ(nextQ.opts), 900);
    } else {
      step = 2;
      bot(buildRecoMsg(), true, 600);
      setTimeout(() => setQ(['Oke, mau lanjut!','Kemahalan nih','Masih mau pikir dulu','Lihat semua pilihan']), 1100);
    }
    return;
  }

  if(step >= 2) {
    const isClosing = (m.includes('lanjut') || m.includes('oke') || m.includes('gas') || m.includes('daftar') || m.includes('order') || m.includes('mau'))
      && !m.includes('mahal') && !m.includes('ragu') && !m.includes('pikir') && !m.includes('belum');
    if(isClosing) {
      bot(`Yeay ${name}! Gas langsung ya 🔥`, false, 400);
      setTimeout(() => addMsg(ctaBlock(), 'bot', true), 700);
      return;
    }
    if(m.includes('semua') || m.includes('pilihan lain') || m.includes('opsi lain')) {
      bot(`Ini semua produk ${cfg.brandName}:` + cfg.products.map(pkgCard).join('') + '<br>' + ctaBlock(), true, 400);
      return;
    }
    if(m.includes('fasilitas') || m.includes('apa aja') || m.includes('keunggulan')) {
      bot(T
        ? `${cfg.brandName} menyediakan fasilitas lengkap, staf profesional, dan akses 24 jam di semua cabang.`
        : `${cfg.brandName} punya fasilitas lengkap, staf ramah, dan buka 24 jam di semua cabang! 💪`,
        false, 400);
      setTimeout(() => setQ(['Wah lengkap!','Berapa harganya?','Mau daftar sekarang']), 900);
      return;
    }
    if(!handleRejection(msg)) {
      bot(T
        ? `Ada hal lain yang ingin ditanyakan? ${ctaBlock()}`
        : `Ada yang mau ditanyain lagi? 😊 ${ctaBlock()}`, true, 400);
      setQ(['Lihat semua produk','Mau daftar sekarang','Ada pertanyaan lain']);
    }
  }
}

function switchBrand(brand) {
  cfg = CONFIGS[brand];
  document.querySelectorAll('.brand-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-brand="${brand}"]`).classList.add('active');
  resetChat();
}

function resetChat() {
  prof = {}; step = 0; qIdx = 0; waitingForAddress = false;
  msgsEl.innerHTML = ''; qEl.innerHTML = '';
  setTimeout(() => {
    addMsg(cfg.welcome, 'bot');
    setQ(cfg.questions[0].opts.slice(0, 4));
  }, 200);
}

document.getElementById('sbtn').onclick = () => handle(inp.value);
inp.addEventListener('keydown', e => { if(e.key === 'Enter') handle(inp.value); });

resetChat();
</script>
